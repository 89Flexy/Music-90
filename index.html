:root{
  --bg:#020617;

*{box-sizing:border-box;font-family:Poppins,system-ui}
body{
  margin:0;

  background:radial-gradient(circle at top,#0b2a3d,#020617 65%);
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
}
.player{
  position: fixed;              /* 🔒 FIXED */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); /* 🎯 CENTER */
  
  width: 360px;
  padding: 18px;
  border-radius: 26px;
  background:
    linear-gradient(rgba(2,6,23,0.35),rgba(2,6,23,0.50)),
    url("https://i.ibb.co/mCR3vR1K/8cd2391b0e8074fd5ba390a55799f750.jpg");
  background-size: cover;
  background-position: center;
  box-shadow: 0 30px 70px rgba(0,0,0,.7);
}
  .cover{
  height:220px;
  border-radius:18px;

  /* 🎯 DEFAULT IMAGE (play se pehle) */
  background: url("https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg") center/cover;

  display:flex;
  align-items:center;
  justify-content:center;
  font-size:64px;
  margin-bottom:14px;
}
.progress input{width:100%;accent-color:var(--accent)}
.controls{
  display:flex;
  justify-content:center;
  gap:20px;
}
.controls button{
  border:none;
  background:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}
.play{
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--accent);
  color:#022c22;
}
.list{margin-top:12px;max-height:160px;overflow:auto}
.song{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  margin-bottom:8px;
  cursor:pointer;
}
.song img{width:36px;height:36px;border-radius:6px;object-fit:cover}
.song:hover{background:rgba(56,189,248,.2)}

/* MOBILE LOGO */
.mobile-logo{
  position:fixed;
  top:14px;
  left:14px;
  width:44px;
  height:44px;
  border-radius:50%;
  object-fit:cover;
  z-index:999;
  display:none;
  box-shadow:0 0 12px rgba(56,189,248,.6);
}
@media(max-width:768px){
  .mobile-logo{display:block;}
}
.cover.playing {
  animation: float 5s ease-in-out infinite; /* ⚡ 5s = slow */
}

@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}
/* 🎨 BACKGROUND MODAL */
.bg-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.bg-box{
  max-height: 80vh;   /* modal ki max height */
  overflow-y: auto;  /* vertical scroll */
  padding-right: 10px;
}

/* smooth & clean scrollbar (optional but sexy 😎) */
.bg-box::-webkit-scrollbar{
  width: 6px;
}
.bg-box::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}
.bg-box::-webkit-scrollbar-track{
  background: transparent;
}

.bg-box h3{
  text-align:center;
  margin-bottom:12px;
}

.bg-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.bg-grid img{
  width:105%;
  height:105px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:.25s;
}

.bg-grid img:hover{
  outline:2px solid #38bdf8;
  transform:scale(1.05);
}

.bg-close{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.1);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
  .top-text {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  
  font-family: 'Dancing Script', cursive;
  font-size: 32px;
  font-weight: 900;
  color: #38bdf8;
  text-align: center;
  letter-spacing: 1.5px;

  z-index: 10000;
  pointer-events: none;

  /* base glow */
  text-shadow: 0 0 4px #38bdf8;

  /* startup fast flicker */
  animation: startupFlicker 1.2s linear 1 forwards;
}

/* fast flicker on page load */
@keyframes startupFlicker {
  0% { opacity: 0.1; text-shadow: none; }
  10% { opacity: 1; text-shadow: 0 0 6px #38bdf8; }
  20% { opacity: 0.2; text-shadow: none; }
  30% { opacity: 1; text-shadow: 0 0 8px #38bdf8; }
  40% { opacity: 0.3; text-shadow: none; }
  50% { opacity: 1; text-shadow: 0 0 10px #38bdf8; }
  60% { opacity: 0.4; text-shadow: none; }
  70% { opacity: 1; text-shadow: 0 0 12px #38bdf8; }
  80% { opacity: 0.5; text-shadow: none; }
  90% { opacity: 1; text-shadow: 0 0 14px #38bdf8; }
  100% { opacity: 1; text-shadow: 0 0 4px #38bdf8; } /* normal glow freeze */
}

/* subtle flicker class for 30s interval */
.flicker {
  animation: shortFlicker 0.4s ease-in-out 1 forwards;
}

@keyframes shortFlicker {
  0% { opacity: 1; text-shadow: 0 0 4px #38bdf8; }
  50% { opacity: 0.7; text-shadow: 0 0 12px #38bdf8; }
  100% { opacity: 1; text-shadow: 0 0 4px #38bdf8; }
}
.playlist-buttons{

gap:12px;

/* BASE BUTTON */
.filter-btn{
padding:8px 20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.25);

font-size:14px;
font-weight:600;
cursor:pointer;
color:#e5e7eb;

background:transparent;

backdrop-filter:none;
-webkit-backdrop-filter:none;

transition:all .35s ease;
position:relative;
overflow:hidden;
}

/* SHINE EFFECT */
.filter-btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);
transition:.6s;
}

/* HOVER (💚 light green glow) */
.filter-btn:hover{
transform:translateY(-3px) scale(1.03);
background:rgba(74,222,128,0.15); /* light green */

box-shadow:
0 6px 20px rgba(0,0,0,0.3),
0 0 12px rgba(74,222,128,0.5);
}

.filter-btn:hover::before{
left:100%;
}

/* ACTIVE (💚 main green button) */
.filter-btn.active{
background:#4ade80; /* light green */
color:#022c22;

border:1px solid rgba(255,255,255,0.6);

box-shadow:
0 0 18px rgba(74,222,128,.9),
0 0 30px rgba(74,222,128,.4);
}

/* RIPPLE */
.filter-btn::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,.35);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:.5s;
}

.filter-btn:active::after{
width:220px;
height:220px;
opacity:0;
}

  <script>
      
      function filterSongs(type,btn){

currentFilter = type;

/* active button */
document.querySelectorAll(".filter-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

/* clear list */
list.innerHTML="";

/* reset indexes */
filteredIndexes = [];

songs.forEach((s,i)=>{

if(type==="all" || s.category===type){

filteredIndexes.push(i);

const d=document.createElement("div");
d.className="song";

d.innerHTML=`<img src="${s.cover}">
<span>${s.name}</span>`;

d.onclick=()=>playSong(i);

list.appendChild(d);

}

});

}
const topText = document.querySelector('.top-text');

// every 30s, add flicker class
setInterval(() => {
  topText.classList.add('flicker');
  
  // remove class after animation ends
  setTimeout(() => {
    topText.classList.remove('flicker');
  }, 400); // duration = 0.4s
}, 30000); // 30000ms = 30s
  </script>

const audio=document.getElementById("audio");
const list=document.getElementById("list");
const nameUI=document.getElementById("songName");
const cover=document.getElementById("cover");
const progress=document.getElementById("progress");
const playBtn=document.getElementById("playBtn");
let filteredIndexes = songs.map((_,i)=>i); 
let currentFilter = "all";
let index=0;

/* PLAY SONG */
function playSong(i){
  index = i;
  const s = songs[i];

  audio.src = s.url;
  audio.play();

  nameUI.innerText = s.name;
  playBtn.innerText = "⬜";

  cover.style.background = `url(${s.cover}) center/cover`;
  cover.innerHTML = "";
  cover.classList.add("playing");

  // 🔒 LOCK SCREEN IMAGE
  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: s.name,
      artist: "Music-89",
      album: "Music-89",
      artwork: [
        { src: "https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg", sizes: "96x96", type: "image/png" },
        { src: "https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg", sizes: "128x128", type: "image/png" },
        { src: "https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg", sizes: "192x192", type: "image/png" },
        { src: "https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg", sizes: "256x256", type: "image/png" },
        { src: "https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg", sizes: "384x384", type: "image/png" },
        { src: "https://i.ibb.co/9mqzHh07/b6084f026b016b404ee4f186944e5885.jpg", sizes: "512x512", type: "image/png" }
      ]
    });

    navigator.mediaSession.setActionHandler("play", () => audio.play());
    navigator.mediaSession.setActionHandler("pause", () => audio.pause());
    navigator.mediaSession.setActionHandler("nexttrack", next);
    navigator.mediaSession.setActionHandler("previoustrack", prev);
  }
}

function toggle(){

  if(!audio.src){
    playSong(filteredIndexes[0]); // 🔥 current section ka first song
    return;
  }

  if(audio.paused){
    audio.play();
    playBtn.innerText = "⬜";
    cover.classList.add("playing");
  } 
  else{
    audio.pause();
    playBtn.innerText = "▶";
    cover.classList.remove("playing");
  }

}

audio.onended = () => {
  next(); // auto next song
};
/* PLAYLIST */
songs.forEach((s,i)=>{
  const d=document.createElement("div");
  d.className="song";
  d.innerHTML=`<img src="${s.cover}"><span>${s.name}</span>`;
  d.onclick=()=>playSong(i);
  list.appendChild(d);
});

/* PROGRESS */
audio.ontimeupdate=()=>{
  progress.max=audio.duration||0;
  progress.value=audio.currentTime||0;
};
progress.oninput=()=>audio.currentTime=progress.value;
audio.onended=next;
</script>
<script>
function next(){

let pos = filteredIndexes.indexOf(index);

pos++;

if(pos >= filteredIndexes.length){
pos = 0;
}

index = filteredIndexes[pos];

playSong(index);

}

function prev(){

let pos = filteredIndexes.indexOf(index);

pos--;

if(pos < 0){
pos = filteredIndexes.length - 1;
}

index = filteredIndexes[pos];

playSong(index);

}
</script>
<script>
const bgModal = document.getElementById("bgModal");
const bgGrid  = document.getElementById("bgGrid");
const player  = document.querySelector(".player");

/* OPEN */
function openBgModal(){
  bgModal.style.display = "flex";
}

/* CLOSE */
function closeBgModal(){
  bgModal.style.display = "none";
}

/* APPLY BACKGROUND */
bgGrid.querySelectorAll("img").forEach(img=>{
  img.onclick = ()=>{
    setBg(img.src);
    localStorage.setItem("playerBg", img.src);
    closeBgModal();
  };
});

/* SET BG */
function setBg(src){
  player.style.background =
    `linear-gradient(rgba(2,6,23,0.35),rgba(2,6,23,0.50)), url(${src}) center/cover`;
}

/* LOAD SAVED BG */
const savedBg = localStorage.getItem("playerBg");
if(savedBg){
  setBg(savedBg);
}
</script>

    let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  // Prevent the mini-infobar from appearing
  e.preventDefault();
  deferredPrompt = e;
  
  // Show the install button
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  // Hide the install button
  installBtn.style.display = 'none';
  
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`User response to install: ${outcome}`);
    deferredPrompt = null;
  }
});
